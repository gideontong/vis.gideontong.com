        --bg-elev: #ffffff;
        --text: #09090b;
        --text-secondary: #71717a;
        --text-tertiary: #a1a1aa;
        --border: #e4e4e7;
        --border-hover: #d4d4d8;
        --accent: #18181b;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md:
          0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.08);
        --featured: #2563eb;
        --radius: 16px;
        --transition: 200ms cubic-bezier(0.2, 0, 0, 1);
      }

      [data-theme="dark"] {
        --bg: #09090b;
        --bg-elev: #121215;
        --text: #fafafa;
        --text-secondary: #a1a1aa;
        --text-tertiary: #71717a;
        --border: #232326;
        --border-hover: #2e2e32;
        --accent: #fafafa;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md:
          0 4px 12px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.5);
        --featured: #60a5fa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
        transition:
          background-color var(--transition),
          color var(--transition);
      }

      .bg-gradient {
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(
            800px circle at 50% -10%,
            rgba(37, 99, 235, 0.08),
            transparent 50%
          ),
          radial-gradient(
            600px circle at 85% 5%,
            rgba(124, 58, 237, 0.06),
            transparent 50%
          );
        pointer-events: none;
      }

      [data-theme="dark"] .bg-gradient {
        opacity: 0.7;
        background:
          radial-gradient(
            800px circle at 50% -10%,
            rgba(37, 99, 235, 0.12),
            transparent 50%
          ),
          radial-gradient(
            600px circle at 85% 5%,
            rgba(124, 58, 237, 0.08),
            transparent 50%
          );
      }

      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 48px 24px 24px;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px 8px 12px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text);
        font-weight: 500;
        font-size: 14px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .nav-btn:hover {
        border-color: var(--border-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .theme-toggle {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text-secondary);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .theme-toggle:hover {
        border-color: var(--border-hover);
        color: var(--text);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .theme-toggle:active {
        transform: translateY(0);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
        transition: transform 0.4s ease;
      }

      .theme-toggle:hover svg {
        transform: rotate(15deg);
      }

      header {
        margin-bottom: 40px;
        text-align: center;
      }

      h1 {
        font-size: clamp(28px, 5vw, 40px);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 16px;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 32px;
      }

      @media (min-width: 768px) {
        .controls {
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
        }
      }

      .search-container {
        position: relative;
        flex: 1;
        max-width: 500px;
      }

      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        color: var(--text-secondary);
        pointer-events: none;
      }

      .search-input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition: all var(--transition);
      }

      .search-input:focus {
        border-color: var(--featured);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .toggle-group {
        display: flex;
        background: var(--border);
        padding: 4px;
        border-radius: 12px;
        gap: 4px;
      }

      .toggle-btn {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }

      .toggle-btn.active {
        background: var(--bg-elev);
        color: var(--text);
        box-shadow: var(--shadow-sm);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 48px;
      }

      @media (min-width: 1024px) {
        .grid {
          grid-template-columns: repeat(4, 1fr);
          gap: 24px;
        }
      }

      @media (min-width: 1400px) {
        .grid {
          grid-template-columns: repeat(6, 1fr);
        }
      }

      .card {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--border-hover);
      }

      .card-img {
        width: 100%;
        aspect-ratio: 2.35 / 1.5;
        background: linear-gradient(135deg, #e4e4e7, #d4d4d8);
        position: relative;
      }

      [data-theme="dark"] .card-img {
        background: linear-gradient(135deg, #232326, #2e2e32);
      }

      .card-body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--text);
        line-height: 1.3;
      }

      .card-issuer {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      .card-footer {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .footer-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        text-align: center;

      .footer-val {

        font-weight: 600;
        color: var(--text);

      .footer-label {
        font-size: 11px;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 2px;

        font-size: 13px;
        color: var(--text-tertiary);
        text-align: center;
        font-style: italic;
        padding: 4px 0;

        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid var(--border);

      const grid = document.getElementById("cardGrid");
      const searchInput = document.getElementById("searchInput");
      const toggleBtns = document.querySelectorAll(".toggle-btn");

      let currentFilter = "all";
      let currentSearch = "";

      function renderCards() {
        grid.innerHTML = "";

        const filtered = cards.filter((c) => {
          const matchSearch =
            c.name.toLowerCase().includes(currentSearch) ||
            c.bank.toLowerCase().includes(currentSearch);

          let matchFilter = true;
          if (currentFilter !== "all") {
            matchFilter = c.gb === currentFilter;
          }

          return matchSearch && matchFilter;
        });

        if (filtered.length === 0) {
          grid.innerHTML =
            '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-tertiary); padding: 48px;">No cards found.</div>';
          return;
        }

        const htmlStr = filtered
          .map((c) => {
            let footerHtml = "";
            if (c.gb) {
              footerHtml = `
              <div class="footer-grid">
                <div>
                  <div class="footer-val">${c.gb}</div>
                  <div class="footer-label">Data</div>
                </div>
                <div>
                  <div class="footer-val">${c.validity}</div>
                  <div class="footer-label">Valid</div>
                </div>
                <div>
                  <div class="footer-val">${c.refresh}</div>
                  <div class="footer-label">Refresh</div>
                </div>
              </div>
            `;
            } else {
              footerHtml = `<div class="ineligible">Not Eligible for Free eSIM</div>`;
            }

            let imgStyle = "";
            if (c.img) {
              imgStyle = `style="background-image: url('${c.img}'); background-size: cover; background-position: center;"`;
            }

            return `
            <div class="card">
              <div class="card-img" ${imgStyle}></div>
              <div class="card-body">
                <div class="card-title">${c.name}</div>
                <div class="card-issuer">${c.bank}</div>
                <div class="card-footer">
                  ${footerHtml}
                </div>
              </div>
            </div>
          `;
          })
          .join("");

        grid.innerHTML = htmlStr;
      }

      // Event Listeners
      searchInput.addEventListener("input", (e) => {
        currentSearch = e.target.value.toLowerCase();
        renderCards();
      });

      toggleBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          toggleBtns.forEach((b) => b.classList.remove("active"));
          e.target.classList.add("active");
          currentFilter = e.target.getAttribute("data-filter");
          renderCards();
        });
      });

      // Initial Render
      renderCards();
