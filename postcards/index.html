<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postcards - Gideon's Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <script>
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3 {
        font-family: "Playfair Display", serif;
      }
      .leaflet-container {
        font-family: "Inter", sans-serif;
        z-index: 10;
      }
      .leaflet-popup-content-wrapper {
        border-radius: 12px;
      }
    </style>
  </head>
  <body class="bg-[#fcfaf7] dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex flex-col">
    <div class="max-w-6xl mx-auto px-6 py-10 md:py-16 w-full flex-1">
      <!-- Header & Navigation -->
      <div class="mb-10 flex items-center justify-between">
        <a
          href="/"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Back to Main
        </a>
        <button
          id="theme-toggle"
          type="button"
          class="text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm p-2 transition-colors shadow-sm focus:outline-none"
        >
          <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
        </button>
      </div>

      <!-- Page Title -->
      <div class="mb-12">
        <h1 class="text-4xl md:text-5xl text-slate-900 dark:text-white mb-4">
          Postcards
        </h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl">
          What postcards at the wedding could potentially look like.
        </p>
      </div>

      <!-- Carousel Section -->
      <div class="relative w-full h-[40vh] md:h-[50vh] rounded-[2rem] overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-700 group mb-12 bg-slate-200 dark:bg-slate-800" id="carousel-container">
        <div id="carousel-images" class="absolute inset-0 flex items-center justify-center"></div>
        <div id="carousel-indicators" class="absolute bottom-6 left-0 right-0 flex justify-center gap-2.5 z-50"></div>
        <div class="absolute top-4 right-4 z-50 bg-black/50 backdrop-blur-md rounded-full px-3.5 py-2 text-white text-xs font-medium opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2 pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
          Click to enlarge
        </div>
        <!-- Navigation Buttons -->
        <button id="carousel-prev" class="absolute left-4 top-1/2 -translate-y-1/2 z-50 bg-black/40 hover:bg-black/70 text-white rounded-full p-3 backdrop-blur-md transition-all opacity-0 group-hover:opacity-100 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button id="carousel-next" class="absolute right-4 top-1/2 -translate-y-1/2 z-50 bg-black/40 hover:bg-black/70 text-white rounded-full p-3 backdrop-blur-md transition-all opacity-0 group-hover:opacity-100 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>

      <!-- Map Section -->
      <div class="w-full h-[60vh] md:h-[75vh] min-h-[500px] rounded-[2rem] overflow-hidden shadow-lg border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 relative z-0 mb-16">
        <div id="map" class="absolute inset-0 z-0"></div>
      </div>

      <!-- Gallery Section -->
      <div class="mb-8">
        <h2 class="text-3xl md:text-4xl text-slate-900 dark:text-white mb-8 font-serif">
          All Postcards
        </h2>
        <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>
      </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300">
      <button id="lightbox-close" class="absolute top-6 right-6 p-2 text-white/70 hover:text-white transition-colors bg-white/10 hover:bg-white/20 rounded-full backdrop-blur-md">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
      <div class="relative w-full max-w-[90vw] h-[85vh] flex items-center justify-center p-4">
        <img id="lightbox-img" src="" alt="Postcard" class="max-h-full max-w-full object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300">
      </div>
      <div id="lightbox-caption" class="absolute bottom-8 left-0 right-0 text-center text-white text-2xl font-medium tracking-wide drop-shadow-lg" style="font-family: 'Playfair Display', serif;"></div>
    </div>

    <script>
      // Modify this array to match the images in your postcards/images folder.
      // Filename convention: two letter country code and the city name (e.g. us-san-francisco.webp).
      const postcards = [
        { filename: "AE_Dubai.webp", name: "Dubai, United Arab Emirates", lat: 25.2048, lng: 55.2708 },
        { filename: "AT_Vienna.webp", name: "Vienna, Austria", lat: 48.2082, lng: 16.3738 },
        { filename: "HK_HongKong.webp", name: "Hong Kong", lat: 22.3193, lng: 114.1694 },
        { filename: "IT_Rome.webp", name: "Rome, Italy", lat: 41.9028, lng: 12.4964 },
        { filename: "MO_Macau.webp", name: "Macau", lat: 22.1987, lng: 113.5439 },
        { filename: "MY_KualaLumpur.webp", name: "Kuala Lumpur, Malaysia", lat: 3.1390, lng: 101.6869 },
        { filename: "SA_Mecca.webp", name: "Mecca, Saudi Arabia", lat: 21.3891, lng: 39.8579 },
        { filename: "TH_Bangkok.webp", name: "Bangkok, Thailand", lat: 13.7563, lng: 100.5018 },
        { filename: "TR_Antalya.webp", name: "Antalya, Turkey", lat: 36.8969, lng: 30.7133 },
        { filename: "TR_Istanbul.webp", name: "Istanbul, Turkey", lat: 41.0082, lng: 28.9784 },
        { filename: "US_NewYorkCity.webp", name: "New York City, US", lat: 40.7128, lng: -74.0060 },
        { filename: "US_SanFrancisco.webp", name: "San Francisco, US", lat: 37.7749, lng: -122.4194 }
      ];

      let currentIndex = 0;
      let autoRotateInterval;
      const mapMarkers = [];
      let map;

      const defaultIcon = L.divIcon({
        className: "custom-div-icon",
        html: `<div class="w-4 h-4 bg-sky-500 rounded-full border-[2.5px] border-white shadow-md transition-all duration-300"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });

      const activeIcon = L.divIcon({
        className: "custom-div-icon",
        html: `<div class="w-5 h-5 bg-pink-500 rounded-full border-[2.5px] border-white shadow-lg scale-110 transition-all duration-300"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });

      function renderCarousel() {
        const container = document.getElementById("carousel-images");
        const indicators = document.getElementById("carousel-indicators");

        postcards.forEach((pc, index) => {
          const slide = document.createElement("div");
          slide.className = `absolute inset-0 w-full h-full flex items-center justify-center transition-all duration-700 ease-in-out cursor-pointer`;
          slide.id = `carousel-slide-${index}`;
          slide.addEventListener("click", () => {
            if (currentIndex === index) {
              // Open lightbox if clicking the active slide
              openLightbox();
            } else {
              // Otherwise navigate to that slide
              pauseRotation();
              goToSlide(index);
              if (map) map.flyTo([pc.lat, pc.lng], 5, { duration: 1.5 });
            }
          });

          const img = document.createElement("img");
          img.src = `images/${pc.filename}`;
          img.onerror = () => { img.src = `https://placehold.co/1200x600/slate/white?text=${encodeURIComponent(pc.name)}` };
          img.className = `w-full h-full object-contain rounded-2xl shadow-xl`;
          img.id = `carousel-img-${index}`;
          slide.appendChild(img);

          container.appendChild(slide);

          const dot = document.createElement("button");
          dot.className = `w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300`;
          dot.id = `indicator-${index}`;
          dot.addEventListener("click", (e) => {
            e.stopPropagation();
            pauseRotation();
            goToSlide(index);
            if (map) map.flyTo([pc.lat, pc.lng], 5, { duration: 1.5 });
          });
          indicators.appendChild(dot);
        });

        // Event listeners for Prev/Next buttons
        document.getElementById("carousel-prev").addEventListener("click", (e) => {
          e.stopPropagation();
          pauseRotation();
          goToSlide((currentIndex - 1 + postcards.length) % postcards.length);
          const pc = postcards[currentIndex];
          if (map) map.flyTo([pc.lat, pc.lng], 5, { duration: 1.5 });
        });

        document.getElementById("carousel-next").addEventListener("click", (e) => {
          e.stopPropagation();
          pauseRotation();
          goToSlide((currentIndex + 1) % postcards.length);
          const pc = postcards[currentIndex];
          if (map) map.flyTo([pc.lat, pc.lng], 5, { duration: 1.5 });
        });

        updateCarouselTransforms();
      }

      function updateCarouselTransforms() {
        const total = postcards.length;
        postcards.forEach((pc, index) => {
          const slide = document.getElementById(`carousel-slide-${index}`);
          const dot = document.getElementById(`indicator-${index}`);
          
          // Calculate shortest distance in a circular array
          let diff = index - currentIndex;
          if (diff < -Math.floor(total/2)) diff += total;
          if (diff > Math.floor(total/2)) diff -= total;

          // Base styling
          let transform = "translateX(0) scale(0.2)";
          let zIndex = 0;
          let opacity = 0;

          if (diff === 0) {
            transform = "translateX(0) scale(1)";
            zIndex = 30;
            opacity = 1;
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white scale-110";
          } else if (diff === -1) {
            transform = "translateX(-45%) scale(0.75)";
            zIndex = 20;
            opacity = 0.7;
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white/40 hover:bg-white/70";
          } else if (diff === 1) {
            transform = "translateX(45%) scale(0.75)";
            zIndex = 20;
            opacity = 0.7;
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white/40 hover:bg-white/70";
          } else if (diff === -2) {
            transform = "translateX(-80%) scale(0.55)";
            zIndex = 10;
            opacity = 0.4;
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white/40 hover:bg-white/70";
          } else if (diff === 2) {
            transform = "translateX(80%) scale(0.55)";
            zIndex = 10;
            opacity = 0.4;
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white/40 hover:bg-white/70";
          } else {
            dot.className = "w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all duration-300 bg-white/20 hover:bg-white/50";
          }

          slide.style.transform = transform;
          slide.style.zIndex = zIndex;
          slide.style.opacity = opacity;
        });
      }

      function goToSlide(index) {
        if (mapMarkers[currentIndex]) mapMarkers[currentIndex].setIcon(defaultIcon);
        currentIndex = index;
        updateCarouselTransforms();
        if (mapMarkers[currentIndex]) mapMarkers[currentIndex].setIcon(activeIcon);
      }

      function startRotation() {
        clearInterval(autoRotateInterval);
        autoRotateInterval = setInterval(() => {
          let next = (currentIndex + 1) % postcards.length;
          goToSlide(next);
        }, 4000);
      }

      function pauseRotation() {
        clearInterval(autoRotateInterval);
      }

      function initMap() {
        map = L.map("map", { scrollWheelZoom: true }).setView([20, 0], 2);
        const isDark = document.documentElement.classList.contains("dark");
        const lightTiles = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
        const darkTiles = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";

        window.tileLayer = L.tileLayer(isDark ? darkTiles : lightTiles, {
          attribution: '© OpenStreetMap © CARTO',
          subdomains: 'abcd',
          maxZoom: 19
        }).addTo(map);

        postcards.forEach((pc, index) => {
          const marker = L.marker([pc.lat, pc.lng], { icon: index === 0 ? activeIcon : defaultIcon }).addTo(map);
          marker.bindTooltip(pc.name, { direction: 'top', offset: [0, -10], className: 'font-medium' });
          
          marker.on("mouseover", () => {
            pauseRotation();
            if (currentIndex !== index) goToSlide(index);
          });
          
          marker.on("click", () => {
            pauseRotation();
            goToSlide(index);
            map.flyTo([pc.lat, pc.lng], 5, { duration: 1.5 });
          });

          mapMarkers.push(marker);
        });
      }

      // Lightbox handling
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxCaption = document.getElementById("lightbox-caption");

      function openLightbox() {
        pauseRotation();
        const pc = postcards[currentIndex];
        lightboxImg.src = `images/${pc.filename}`;
        lightboxCaption.textContent = pc.name;
        lightbox.classList.remove("hidden");
        setTimeout(() => {
          lightbox.classList.replace("opacity-0", "opacity-100");
          lightboxImg.classList.replace("scale-95", "scale-100");
        }, 10);
      }

      function closeLightbox() {
        lightbox.classList.replace("opacity-100", "opacity-0");
        lightboxImg.classList.replace("scale-100", "scale-95");
        setTimeout(() => {
          lightbox.classList.add("hidden");
          startRotation(); // Optionally resume rotation after closing
        }, 300);
      }

      document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });

      // Theme handling
      const themeToggleDarkIcon = document.getElementById("theme-toggle-dark-icon");
      const themeToggleLightIcon = document.getElementById("theme-toggle-light-icon");
      const themeToggleBtn = document.getElementById("theme-toggle");
      const lightTilesUrl = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
      const darkTilesUrl = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";

      if (document.documentElement.classList.contains("dark")) {
        themeToggleLightIcon.classList.remove("hidden");
      } else {
        themeToggleDarkIcon.classList.remove("hidden");
      }

      themeToggleBtn.addEventListener("click", function () {
        themeToggleDarkIcon.classList.toggle("hidden");
        themeToggleLightIcon.classList.toggle("hidden");
        document.documentElement.classList.toggle("dark");
        const isDark = document.documentElement.classList.contains("dark");
        localStorage.setItem("color-theme", isDark ? "dark" : "light");
        if (window.tileLayer) {
          window.tileLayer.setUrl(isDark ? darkTilesUrl : lightTilesUrl);
        }
      });

      function renderGallery() {
        const container = document.getElementById("gallery-container");
        postcards.forEach((pc, index) => {
          const item = document.createElement("div");
          item.className = "group relative rounded-xl overflow-hidden shadow-md cursor-pointer aspect-[4/3] bg-slate-200 dark:bg-slate-800";
          item.addEventListener("click", () => {
            currentIndex = index;
            openLightbox();
          });

          const img = document.createElement("img");
          img.src = `images/${pc.filename}`;
          img.onerror = () => { img.src = `https://placehold.co/1200x600/slate/white?text=${encodeURIComponent(pc.name)}` };
          img.className = "w-full h-full object-contain transition-transform duration-500 group-hover:scale-105 p-2";
          item.appendChild(img);

          const overlay = document.createElement("div");
          overlay.className = "absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4";
          
          const title = document.createElement("h3");
          title.className = "text-white font-medium text-lg drop-shadow-md font-serif";
          title.textContent = pc.name;
          overlay.appendChild(title);

          item.appendChild(overlay);
          container.appendChild(item);
        });
      }

      // Initialize
      renderCarousel();
      renderGallery();
      initMap();
      startRotation();
    </script>
  </body>
</html>
